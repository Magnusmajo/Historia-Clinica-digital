services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-historia_clinica}
      POSTGRES_USER: ${POSTGRES_USER:-historia_clinica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hcd-private

  backend:
    build:
      context: ./project/backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-historia_clinica}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-historia_clinica}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:?FRONTEND_ORIGINS is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      APP_API_KEY: ${APP_API_KEY:?APP_API_KEY is required}
      APP_REQUIRE_API_KEY: "true"
      APP_REQUIRE_USER_AUTH: "true"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      SEED_ADMIN_USER: ${SEED_ADMIN_USER:-false}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Administrador}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@elara.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      AUTO_CREATE_TABLES: "false"
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      TRUST_PROXY_HEADERS: "true"
      UPLOAD_DIR: /app/uploads
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_CREDENTIALS_FILE: /app/secrets/google/credentials.json
      GOOGLE_TOKEN_FILE: /app/secrets/google/token.json
      GOOGLE_OAUTH_STATE_FILE: /app/secrets/google/oauth_state
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:?GOOGLE_REDIRECT_URI is required}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-10}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
      RATE_LIMIT_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads-data:/app/uploads
      - google-secrets:/app/secrets/google
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - hcd-private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hcd-private

  frontend:
    build:
      context: ./project/frontend
      args:
        VITE_API_URL: /api
        VITE_API_KEY: ${APP_API_KEY:?APP_API_KEY is required}
        VITE_CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-hcd_csrf}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - hcd-private

volumes:
  postgres-data:
  uploads-data:
  google-secrets:
  redis-data:

networks:
  hcd-private:
    driver: bridge
